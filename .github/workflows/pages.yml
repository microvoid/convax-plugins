name: Publish Registry Pages

on:
  release:
    types: [published]
  workflow_dispatch:
  workflow_run:
    workflows: ["Publish package"]
    types: [completed]

concurrency:
  group: convax-registry-pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the protected catalog source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Fetch published release entries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun tooling/fetch-release-entries.mjs
      - name: Build and stage strict Registry
        run: |
          bun tooling/build-index.mjs \
            --entries dist/release-entries \
            --revision "$GITHUB_SHA"
          mkdir -p dist/site/registry/v1 dist/site/schemas
          cp dist/registry/v1/index.json dist/site/registry/v1/index.json
          cp schemas/*.json dist/site/schemas/
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
