name: Publish package

on:
  push:
    tags:
      - "plugin-*-v*"
      - "skill-*-v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require a commit reachable from main
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor HEAD origin/main
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Validate repository and tag
        run: |
          bun run validate
          bun test
          bun tooling/pack.mjs --tag "$GITHUB_REF_NAME"

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Build immutable package assets
        id: package
        run: |
          bun tooling/pack.mjs --tag "$GITHUB_REF_NAME"
          package_dir="dist/packages/$GITHUB_REF_NAME"
          zip_path="$(find "$package_dir" -maxdepth 1 -type f -name '*.zip' -print -quit)"
          test -n "$zip_path"
          echo "zip=$zip_path" >> "$GITHUB_OUTPUT"
          echo "entry=$package_dir/registry-entry.json" >> "$GITHUB_OUTPUT"
      - name: Attest package ZIP
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.package.outputs.zip }}
      - name: Create immutable GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release or draft already exists; inspect it before retrying." >&2
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes "Deterministic Convax package. Verify the ZIP against registry-entry.json and its build provenance attestation."
          gh release upload "$GITHUB_REF_NAME" \
            "${{ steps.package.outputs.zip }}" \
            "${{ steps.package.outputs.entry }}"
          gh release edit "$GITHUB_REF_NAME" --draft=false
