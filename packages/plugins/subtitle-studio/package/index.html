<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Subtitle Studio</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <script type="module" src="./assets/app.js"></script>
  </head>
  <body>
    <main class="studio" id="studio">
      <section class="player-pane" aria-label="视频播放器">
        <video id="video" playsinline preload="metadata"></video>
        <img id="preview" class="preview" alt="硬字幕擦除预览" hidden />
        <div id="captions" class="captions" aria-live="off"></div>
        <div id="empty" class="empty">
          <span aria-hidden="true">▶</span>
          <strong>连接一个画布视频</strong>
          <p>转写会自动使用视频的音频轨道，无需手动导入音频。</p>
        </div>

        <nav class="actions" aria-label="字幕操作">
          <button data-panel="create" type="button">＋ 制作</button>
          <button data-panel="translate" type="button">文 翻译</button>
          <button data-panel="erase" type="button">◇ 擦除</button>
          <button id="publish" type="button" disabled>＋ 添加到画布</button>
          <button id="export" type="button" disabled>⇩ 导出视频</button>
        </nav>

        <section class="popover" id="createPanel" hidden>
          <header><div><strong>制作字幕</strong><span>自动识别当前视频音频轨道</span></div><button data-close>×</button></header>
          <div class="form three">
            <label><span>语言</span><select id="language"><option value="auto">自动检测</option><option value="zh">中文</option><option value="en">English</option><option value="ja">日本語</option><option value="ko">한국어</option></select></label>
            <label><span>本地模型</span><select id="model"><option value="tiny">Tiny · 最快</option><option value="base" selected>Base · 平衡</option><option value="small">Small · 更准确</option></select></label>
            <label><span>轨道名</span><input id="trackLabel" value="原文" maxlength="80" /></label>
          </div>
          <footer>
            <span>视频不会上传；本地 companion 负责音频提取和转写。</span>
            <div class="button-row"><button id="importSrt" disabled>导入 SRT</button><button id="emptyTrack" disabled>新建空轨道</button><button class="primary" id="transcribe" disabled>转写视频音轨</button></div>
            <input id="srtFile" type="file" accept=".srt,application/x-subrip,text/plain" hidden />
          </footer>
        </section>

        <section class="popover" id="translatePanel" hidden>
          <header><div><strong>翻译字幕</strong><span>生成新的多语言软字幕轨道</span></div><button data-close>×</button></header>
          <div class="form three">
            <label><span>源轨道</span><select id="sourceTrack"></select></label>
            <label><span>目标语言</span><input id="targetLanguage" value="zh-CN" maxlength="64" /></label>
            <label><span>轨道名</span><input id="translatedLabel" value="中文" maxlength="80" /></label>
          </div>
          <footer><span>Agent 仅接收 cue ID 和文本，工具调用被禁用。</span><button class="primary" id="translate" disabled>生成翻译轨道</button></footer>
        </section>

        <section class="popover" id="erasePanel" hidden>
          <header><div><strong>擦除字幕</strong><span>软字幕重封装；硬字幕使用本地 AI</span></div><button data-close>×</button></header>
          <div class="mode-tabs"><button class="active" data-mode="soft">软字幕</button><button data-mode="hard">硬字幕</button></div>
          <div id="softErase" class="erase-body">
            <div id="streams" class="streams"><p>检查后仅显示原视频内嵌字幕，不包含本插件制作的轨道。</p></div>
            <footer><button id="inspect" disabled>检查视频</button><button class="danger" id="eraseSoft" disabled>移除所选流</button></footer>
          </div>
          <div id="hardErase" class="erase-body" hidden>
            <div class="region">
              <label>X<input id="regionX" type="number" min="0" max="1" step="0.01" value="0.05" /></label>
              <label>Y<input id="regionY" type="number" min="0" max="1" step="0.01" value="0.73" /></label>
              <label>宽<input id="regionWidth" type="number" min="0.01" max="1" step="0.01" value="0.90" /></label>
              <label>高<input id="regionHeight" type="number" min="0.01" max="1" step="0.01" value="0.22" /></label>
            </div>
            <footer><span>区域只是文字搜索范围，AI 仅修改检测到的字幕像素。</span><button id="previewHard" disabled>生成预览</button><button class="danger" id="eraseHard" disabled>擦除并生成副本</button></footer>
          </div>
        </section>

        <section class="popover" id="editPanel" hidden>
          <header><div><strong>校对字幕</strong><span id="cueIdentity">选择的字幕片段</span></div><button data-close>×</button></header>
          <div class="form cue-form">
            <label><span>开始 ms</span><input id="cueStart" type="number" min="0" step="10" /></label>
            <label><span>结束 ms</span><input id="cueEnd" type="number" min="1" step="10" /></label>
            <label class="cue-text"><span>字幕文本</span><textarea id="cueText" maxlength="16384"></textarea></label>
          </div>
          <footer><button class="danger" id="deleteCue">删除片段</button><button class="primary" id="saveCue">保存</button></footer>
        </section>

        <div class="controls">
          <button id="play" aria-label="播放" disabled>▶</button>
          <output id="time">00:00 / 00:00</output>
          <span id="status">等待连接视频</span>
        </div>
      </section>

      <section class="timeline" aria-label="字幕轨道">
        <header><div><strong id="title">尚未制作字幕</strong><span id="meta">多语言软字幕轨道会显示在这里</span></div><select id="activeTrack" disabled></select><button id="exportSrt" disabled>导出 SRT</button></header>
        <div id="tracks" class="tracks"><p>制作或翻译字幕后，轨道会出现在这里。</p></div>
      </section>
      <div id="busy" class="busy" hidden><span></span><strong id="busyText">处理中…</strong><button id="cancel">取消</button></div>
      <div id="toast" class="toast" role="status" hidden></div>
    </main>
  </body>
</html>
